name: CI

on:
  push:
    branches: [ work ]
  pull_request:
    branches: [ work ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest docker
          pip install -r requirements.txt
      - name: Lint
        run: ruff .
      - name: Test
        run: pytest
      - name: Docker build
        run: docker build -t realtime-factchecker .
